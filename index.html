
<!DOCTYPE html><html lang="es">
<head>
  <meta charset="UTF-8">
  <title>La Puerta 999</title>
  <style>
    @font-face {
      font-family: 'Regonare';
      src: url('regonare.ttf');
    }body {
  font-family: Regonare, Arial, sans-serif;
  background: radial-gradient(circle at center, #111, #000);
  color: white;
  text-align: center;
  padding: 40px;
}

h1 { font-size: 32px; }

.btn {
  display: block;
  margin: 10px auto;
  padding: 12px 22px;
  background: #ffffff;
  color: black;
  border: none;
  cursor: pointer;
  font-size: 16px;
  border-radius: 10px;
  transition: transform 0.1s, background 0.2s;
}

.btn:hover {
  background: #ddd;
  transform: scale(1.05);
}

#pet { margin-top: 20px; font-size: 18px; }
#stats { margin-top: 10px; font-size: 14px; color: lightgray; }
#dialogue { margin-top: 15px; color: #00ffcc; }
#shopDialogue { margin-top: 10px; color: #ffb6ff; }

#topbar {
  position: fixed;
  top: 10px;
  right: 10px;
}

#container {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 20px rgba(255,255,255,0.1);
}

  </style>
</head>
<body><div id="topbar">
  <button class="btn" onclick="goShop()">🛒 Tienda</button>
  <button class="btn" onclick="resetGame()">🔄 Reiniciar</button>
</div><div id="container">
<h1>🚪 LA PUERTA 999</h1>
<p id="text"></p><div id="choices"></div><div id="pet">🐾 Mascota: Pou bebé triste</div>
<div id="dialogue"></div>
<div id="shopDialogue"></div>
<div id="stats"></div>
</div><script>
let state = "start";
let petMood = 20;
let energy = 50;
let inventory = [];

let coins = 0;
let endingsSeen = [];

// precios dinámicos
let prices = { apple: 10, food: 20, energy: 15 };

if (localStorage.getItem("save")) {
  const save = JSON.parse(localStorage.getItem("save"));
  state = save.state;
  petMood = save.petMood;
  energy = save.energy;
  inventory = save.inventory;
}

if (localStorage.getItem("pouCoins")) {
  const data = JSON.parse(localStorage.getItem("pouCoins"));
  coins = data.coins;
  endingsSeen = data.endingsSeen;
}

function saveGame() {
  localStorage.setItem("save", JSON.stringify({ state, petMood, energy, inventory }));
}

function saveCoins() {
  localStorage.setItem("pouCoins", JSON.stringify({ coins, endingsSeen }));
}

function resetGame() {
  localStorage.removeItem("save");
  location.reload();
}

function randomizePrices() {
  prices.apple = Math.floor(8 + Math.random()*8);
  prices.food = Math.floor(15 + Math.random()*15);
  prices.energy = Math.floor(10 + Math.random()*10);
}

function pouSpeak() {
  const dialogue = document.getElementById("dialogue");
  if (petMood > 60) dialogue.innerText = "Pou: 'Estoy feliz contigo :)'";
  else if (petMood > 30) dialogue.innerText = "Pou: 'Gracias por no olvidarme...'";
  else dialogue.innerText = "Pou: '...tengo miedo'";
}

const shopLines = [
  "Amiga: 'hola!! mira los precios hoy 👀'",
  "Amiga: 'todo cambia... como el Pou'",
  "Amiga: 'no confíes en la puerta 😭'",
  "Amiga: 'compra algo bonito para él'",
  "Amiga: 'los precios... no son estables'"
];

function shopSpeak() {
  const el = document.getElementById("shopDialogue");
  el.innerText = shopLines[Math.floor(Math.random()*shopLines.length)];
}

function addCoinsForEnding(name) {
  if (!endingsSeen.includes(name)) {
    endingsSeen.push(name);
    coins += 10;
    saveCoins();
  }
}

function render() {
  const text = document.getElementById("text");
  const choices = document.getElementById("choices");
  const stats = document.getElementById("stats");
  const shopDialogue = document.getElementById("shopDialogue");

  choices.innerHTML = "";
  shopDialogue.innerText = "";

  stats.innerText = `❤️ ${petMood} | ⚡ ${energy} | 💰 ${coins}`;
  pouSpeak();

  if (state === "start") {
    text.innerText = "Despiertas... la puerta respira.";
    addChoice("Tomar llave", "key");
    addChoice("Tomar celular", "phone");
    addChoice("Tomar galleta", "cookie");
    addChoice("Abrazar al Pou", "pet_hug");
  }

  else if (state === "shop") {
    randomizePrices();
    text.innerText = "🛒 Tienda";
    shopSpeak();
    addChoice(`🍎 Manzana (${prices.apple})`, "buy_apple");
    addChoice(`🍗 Comida (${prices.food})`, "buy_food");
    addChoice(`⚡ Energía (${prices.energy})`, "buy_energy");
    addChoice("Salir", "start");
  }

  else if (state === "buy_apple") {
    if (coins >= prices.apple) { coins -= prices.apple; petMood += 10; saveCoins(); }
    text.innerText = "Le das una manzana 🍎";
    addChoice("Volver", "shop");
  }

  else if (state === "buy_food") {
    if (coins >= prices.food) { coins -= prices.food; petMood += 25; saveCoins(); }
    text.innerText = "Pou come 🍗";
    addChoice("Volver", "shop");
  }

  else if (state === "buy_energy") {
    if (coins >= prices.energy) { coins -= prices.energy; energy += 20; saveCoins(); }
    text.innerText = "Más energía ⚡";
    addChoice("Volver", "shop");
  }

  else if (state === "pet_hug") {
    text.innerText = "Abrazas al Pou";
    petMood += 20; energy -= 5;
    saveGame();
    addChoice("Continuar", "start");
  }

  else if (state === "key") {
    if (!inventory.includes("Llave")) inventory.push("Llave");
    text.innerText = "La llave susurra";
    petMood -= 5;
    saveGame();
    addChoice("Abrir puerta", "door_bad");
    addChoice("Guardar", "start");
  }

  else if (state === "phone") {
    if (!inventory.includes("Celular")) inventory.push("Celular");
    text.innerText = "El celular vibra";
    saveGame();
    addChoice("Abrir puerta", "door_secret");
    addChoice("Ignorar", "start");
  }

  else if (state === "cookie") {
    if (!inventory.includes("Galleta")) inventory.push("Galleta");
    text.innerText = "La galleta brilla";
    saveGame();
    addChoice("Dársela", "feed_pet");
    addChoice("Comerla", "power_up");
  }

  else if (state === "feed_pet") {
    text.innerText = "Pou sonríe";
    petMood += 40;
    saveGame();
    addChoice("Continuar", "start");
  }

  else if (state === "power_up") {
    text.innerText = "Energía extra";
    energy += 30;
    saveGame();
    addChoice("Continuar", "start");
  }

  else if (state === "door_bad") {
    addCoinsForEnding("bad");
    text.innerText = petMood > 50 ? "✨ FINAL BUENO" : "💀 FINAL MALO";
  }

  else if (state === "door_secret") {
    addCoinsForEnding("secret");
    text.innerText = inventory.includes("Llave") ? "👁️ FINAL PRO" : "👁️ FINAL SECRETO";
  }
}

function addChoice(text, next) {
  const btn = document.createElement("button");
  btn.innerText = text;
  btn.className = "btn";
  btn.onclick = () => { state = next; saveGame(); render(); };
  document.getElementById("choices").appendChild(btn);
}

function goShop() { state = "shop"; render(); }

render();
</script></body>
</html>
